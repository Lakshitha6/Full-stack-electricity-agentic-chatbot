app:
  name: "Electricity Bill Platform"
  version: "1.0.0"
  environment: "production"

logging:
  level: "INFO"
  format: "json"  # Structured JSON logs for CloudWatch/DataDog
  handlers: ["console", "file"]

database:
  pool_size: 20
  max_overflow: 10
  pool_timeout: 30

llm:
  timeout: 15
  retries: 2
  fallback_enabled: true

rate_limiting:
  requests_per_minute: 10
  burst: 15

security:
  jwt_expiry_hours: 24
  cors_origins: ["https://your-frontend.com"]