services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override REDIS_URL for Docker networking (service name = "redis")
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=testing  # Skip JWT auth in tests
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy  # Wait for Redis to be ready

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"  # Expose for local debugging (optional)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  redis_data: